version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: staff-management-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "StaffMgmt@2024!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql/data
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "StaffMgmt@2024!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: staff-management-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      bash -c "
        echo 'Running initialization script...'
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'StaffMgmt@2024!' -C -i /database/init-db.sql
        echo 'Database initialized successfully.'
      "
    volumes:
      - ./database/init-db.sql:/database/init-db.sql

  api:
    build:
      context: .
      dockerfile: src/StaffManagement.API/Dockerfile
    container_name: staff-management-api
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
    ports:
      - "8080:5000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  sqlserver_data:
