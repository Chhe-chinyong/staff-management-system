name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Unit Tests
        run: dotnet test tests/StaffManagement.UnitTests --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Run Integration Tests
        run: dotnet test tests/StaffManagement.IntegrationTests --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Run E2E Tests
        run: dotnet test tests/StaffManagement.E2ETests --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Generate Coverage Report
        if: always()
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: backend/coverage/**/coverage.cobertura.xml
          targetdir: backend/coveragereport
          reporttypes: "HtmlInline;Cobertura;MarkdownSummaryGithub"

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coveragereport

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
